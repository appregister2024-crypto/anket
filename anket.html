<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Güvenli Oylama Sistemi</title>
    <style>
        /* ARKA PLAN - GÖZ YORMAYAN MODERN GEÇİŞ */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: linear-gradient(135deg, #f4f7f6 0%, #e9eff1 100%);
            color: #333; 
            padding: 20px;
        }
        
        /* FORM KUTUSU VE LOGO ALANI DÜZENİ */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        /* LOGO KUTUSU */
        .logo-container {
            margin-bottom: 20px;
            text-align: center;
        }
        .logo-container img {
            max-width: 220px;
            height: auto;
        }

        /* FORM KUTUSU */
        .container { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            width: 100%; 
            box-sizing: border-box;
        }

        h1, h2, h3 { text-align: center; color: #2c3e50; margin-top: 5px; }
        .hidden { display: none !important; }
        input[type="text"], input[type="password"], input[type="number"], button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px;}
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        
        /* ÖZEL EKLENEN YAN YANA YERLEŞİM STİLLERİ */
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .flex-row input { margin: 0 !important; }
        .edit-btn { background-color: #f39c12 !important; padding: 6px 12px !important; font-size: 13px !important; }
        .edit-btn:hover { background-color: #e67e22 !important; }
        .delete-btn { background-color: #c0392b !important; padding: 6px 12px !important; font-size: 13px !important; }
        .delete-btn:hover { background-color: #a93226 !important; }
        .edit-container { background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; margin-top: 15px; }

        .admin-btn { background-color: #e74c3c; margin-top: 20px; }
        .admin-btn:hover { background-color: #c0392b; }
        .poll-option { display: block; margin-bottom: 12px; padding: 12px; background: #fdfdfd; border-radius: 6px; border: 1px solid #e0e0e0; cursor: pointer; transition: background 0.2s; }
        .poll-option:hover { background: #f1f8ff; }
        .poll-option input { margin-right: 10px; transform: scale(1.2); }
        .code-list { max-height: 200px; overflow-y: auto; background: #eee; padding: 10px; font-family: monospace; font-size: 14px; border-radius: 5px; margin-top: 10px; }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #e0e0e0; }
        .error { color: #e74c3c; font-size: 14px; text-align: center; font-weight: bold; }
        .success { color: #27ae60; font-size: 14px; text-align: center; font-weight: bold; }
        .result-bar { background: #e0e0e0; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .result-fill { 
            height: 22px; 
            text-align: right; 
            padding-right: 8px; 
            color: white; 
            font-size: 13px; 
            line-height: 22px; 
            width: 0%; 
            transition: width 0.8s ease, background-color 0.8s ease;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.6);
        }
        .prefix { color: #2980b9; font-weight: bold; margin-right: 5px; }
        .winner-crown { font-size: 1.5em; margin-right: 5px; vertical-align: middle; }
        .clickable-header { cursor: pointer; user-select: none; color: #2980b9; transition: color 0.2s; }
        .clickable-header:hover { color: #1a5276; }
    </style>
</head>

    <div class="container">
        <div id="voter-panel">
            <h1 id="page-title">Oylama Ekranı</h1>
            <p id="voter-message"></p>

            <div id="code-entry-area">
                <p style="text-align:center; font-size:15px; font-weight:500;">Oy kullanabilmek için lütfen katılımcı kodunuzu girin.</p>
                <input type="text" id="voter-code-input" placeholder="4 Haneli Katılım Kodunuz" maxlength="4">
                <button onclick="verifyCode()" style="font-size: 16px;">Kodu Doğrula ve Devam Et</button>
            </div>
            
            <div id="voting-area" class="hidden">
                <p style="text-align:center; color:#e67e22; font-weight:bold;">Lütfen tam olarak 3 seçenek işaretleyin.</p>
                <div id="poll-items-container">Yükleniyor...</div>
                <button onclick="submitVote()" style="background:#27ae60; font-size: 16px;">Seçimlerimi Onayla ve Oy Ver</button>
            </div>

            <div id="public-results-area" class="hidden"></div>
            
            <button class="admin-btn" onclick="showPanel('login-panel')">Admin Girişi</button>
        </div>

        <div id="login-panel" class="hidden">
            <h2>Admin Paneli Girişi</h2>
            <input type="text" id="admin-user" placeholder="Kullanıcı Adı">
            <input type="password" id="admin-pass" placeholder="Şifre">
            <button onclick="loginAdmin()">Giriş Yap</button>
            <p id="login-error" class="error"></p>
            <button onclick="showPanel('voter-panel')" style="background:#95a5a6;">Geri Dön</button>
        </div>

        <div id="admin-panel" class="hidden">
            <h2>Yönetim Paneli</h2>
            
            <h3>1. Oylama Sonuçları ve Ayarlar</h3>
            <button id="toggle-results-btn" onclick="toggleResults()" style="background:#9b59b6;">Sonuçları Herkese Göster: KAPALI</button>
            <div id="admin-results-container" style="margin-top:15px;"></div>
            
            <hr>
            <h3>2. Oylama Maddeleri</h3>
            <div class="flex-row">
                <input type="number" id="new-option-num" placeholder="No" style="width: 80px;">
                <input type="text" id="new-option" placeholder="Yeni seçenek yazın..." style="flex-grow: 1;">
            </div>
            <button onclick="addOption()">Seçenek Ekle</button>
            
            <!-- Düzenleme / Silme Alanı -->
            <div id="admin-options-edit-container" class="edit-container"></div>

            <button onclick="clearOptions()" style="background:#e67e22; margin-top:10px;">Sadece Oyları ve Seçenekleri Sıfırla</button>

            <hr>
            <h3 class="clickable-header" onclick="toggleCodesVisibility()" title="Kodları göstermek/gizlemek için tıklayın">
                3. Katılımcı Kodları 👁️
            </h3>
            <p style="font-size: 12px; color: #666; text-align: center;">Gizli kodları görmek için yukarıdaki başlığa tıklayın.</p>
            
            <button onclick="generateCodes()" style="background:#27ae60;">120 Rastgele Kod Üret</button>
            <button onclick="copyCodes()" style="background:#2980b9;">📋 Kodları Kopyala</button>
            <button onclick="clearCodes()" style="background:#c0392b; margin-top:10px;">Tüm Kodları Sıfırla</button>

            <div class="code-list hidden" id="code-display"></div>
            
            <hr>
            <button class="admin-btn" onclick="logoutAdmin()">Çıkış Yap</button>
        </div>
    </div>
</div>

<script>
    // Firebase Bağlantısı
    const FIREBASE_URL = "https://anket-aa7c7-default-rtdb.firebaseio.com/"; 

    let globalData = { options: {}, codes: {}, showResults: false };
    let currentValidatedCode = null; 
    let adminCodesVisible = false;   

    function getBarColor(percent) {
        if (percent === 0) return 'transparent';
        const lightness = 80 - (percent * 0.45); 
        return `hsl(145, 70%, ${lightness}%)`; 
    }

    function initLiveSync() {
        fetch(FIREBASE_URL + ".json").then(res => res.json()).then(data => {
            if(data) {
                globalData = data;
                if(!globalData.options) globalData.options = {};
                if(!globalData.codes) globalData.codes = {};
            }
            renderVoterPanel();
            renderAdminPanel();
        });

        setInterval(() => {
            fetch(FIREBASE_URL + ".json").then(res => res.json()).then(data => {
                if(data) {
                    globalData = data;
                    if(!globalData.options) globalData.options = {};
                    if(!globalData.codes) globalData.codes = {};
                    
                    if(!document.getElementById('voter-panel').classList.contains('hidden')) {
                        renderVoterPanel();
                    }
                    if(!document.getElementById('admin-panel').classList.contains('hidden')) {
                        renderAdminPanel();
                    }
                }
            });
        }, 3000);
    }

    function saveToFirebase() {
        return fetch(FIREBASE_URL + ".json", {
            method: "PUT",
            body: JSON.stringify(globalData)
        });
    }

    function showPanel(panelId) {
        document.getElementById('voter-panel').classList.add('hidden');
        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById(panelId).classList.remove('hidden');
        
        if(panelId === 'voter-panel') {
            currentValidatedCode = null; 
            document.getElementById('voter-code-input').value = '';
            document.getElementById('voter-message').innerText = '';
            renderVoterPanel();
        }
        if(panelId === 'admin-panel') renderAdminPanel();
    }

    function loginAdmin() {
        const user = document.getElementById('admin-user').value;
        const pass = document.getElementById('admin-pass').value;
        if (user === 'admin' && pass === 'Opex2026') {
            document.getElementById('login-error').innerText = '';
            document.getElementById('admin-user').value = '';
            document.getElementById('admin-pass').value = '';
            showPanel('admin-panel');
        } else {
            document.getElementById('login-error').innerText = 'Hatalı kullanıcı adı veya şifre!';
        }
    }
    function logoutAdmin() { showPanel('voter-panel'); }

    function addOption() {
        const text = document.getElementById('new-option').value.trim();
        const numVal = document.getElementById('new-option-num').value.trim();
        if (text && numVal) {
            const id = "opt_" + Date.now();
            globalData.options[id] = { text: text, votes: 0, number: parseInt(numVal) };
            document.getElementById('new-option').value = '';
            document.getElementById('new-option-num').value = '';
            saveToFirebase().then(() => renderAdminPanel());
        } else {
            alert("Lütfen madde numarası ve seçenek metnini eksiksiz girin.");
        }
    }

    function editOption(id) {
        const opt = globalData.options[id];
        const newNum = prompt("Yeni Madde Numarası:", opt.number || '');
        if (newNum === null) return; 
        const newText = prompt("Yeni Seçenek Metni:", opt.text);
        if (newText === null) return; 

        if (newNum.trim() !== "" && newText.trim() !== "") {
            globalData.options[id].number = parseInt(newNum);
            globalData.options[id].text = newText.trim();
            saveToFirebase().then(() => renderAdminPanel());
        }
    }

    function deleteOption(id) {
        if(confirm("Bu seçeneği silmek istediğinize emin misiniz?")) {
            delete globalData.options[id];
            saveToFirebase().then(() => renderAdminPanel());
        }
    }

    function toggleResults() {
        globalData.showResults = !globalData.showResults;
        saveToFirebase().then(() => renderAdminPanel());
    }

    function clearOptions() {
        if(confirm("DİKKAT! Tüm seçenekler ve verilen oylar silinecek (Kodlar korunacak). Emin misiniz?")) {
            globalData.options = {};
            globalData.showResults = false;
            saveToFirebase().then(() => { renderAdminPanel(); renderVoterPanel(); });
        }
    }

    function clearCodes() {
        if(confirm("DİKKAT! Üretilen tüm kodlar silinecek (Seçenekler korunacak). Emin misiniz?")) {
            globalData.codes = {};
            saveToFirebase().then(() => { renderAdminPanel(); renderVoterPanel(); });
        }
    }

    function generateCodes() {
        if(Object.keys(globalData.codes).length > 0) {
            if(!confirm("Sistemde zaten kodlar var. Yeniden üretmek eskilerini siler. Emin misiniz?")) return;
        }
        const newCodes = new Set();
        while(newCodes.size < 120) {
            newCodes.add(Math.floor(1000 + Math.random() * 9000).toString());
        }
        globalData.codes = {};
        newCodes.forEach(code => globalData.codes[code] = false);
        saveToFirebase().then(() => renderAdminPanel());
    }

    function toggleCodesVisibility() {
        adminCodesVisible = !adminCodesVisible;
        renderAdminPanel();
    }

    function copyCodes() {
        const codeKeys = Object.keys(globalData.codes);
        if(codeKeys.length === 0) { alert("Kopyalanacak kod yok!"); return; }
        
        let textToCopy = "Oylama Katılım Kodları:\n\n";
        codeKeys.forEach((code, index) => {
            textToCopy += `${index + 1}. Kod: ${code}\n`;
        });

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("Tüm kodlar başarıyla kopyalandı! Excel'e veya WhatsApp'a yapıştırabilirsiniz.");
        });
    }

    function renderAdminPanel() {
        const adminResults = document.getElementById('admin-results-container');
        const editContainer = document.getElementById('admin-options-edit-container');
        const optKeys = Object.keys(globalData.options);
        
        let totalVotes = 0;
        optKeys.forEach(id => totalVotes += globalData.options[id].votes);
        
        // 1. Sonuçlar Alanı
        let resultsHtml = '';
        if(optKeys.length === 0) { 
            resultsHtml = '<p>Henüz seçenek eklenmedi.</p>'; 
        } else {
            let optionsArray = optKeys.map((id) => {
                return { id: id, data: globalData.options[id] };
            });
            optionsArray.sort((a, b) => b.data.votes - a.data.votes);
            
            let maxVotes = optionsArray.length > 0 ? optionsArray[0].data.votes : 0;

            optionsArray.forEach((item) => {
                const opt = item.data;
                const percent = totalVotes > 0 ? Math.round((opt.votes / totalVotes) * 100) : 0;
                const dynamicColor = getBarColor(percent);
                
                const isWinner = (opt.votes === maxVotes && maxVotes > 0);
                const prefixHtml = isWinner ? '<span class="winner-crown">👑</span>' : `<span class="prefix">${opt.number || '-'})</span>`;
                
                resultsHtml += `<div style="margin-bottom:10px; font-size:14px;">
                            <strong>${prefixHtml} ${opt.text}</strong> (${opt.votes} Oy)
                            <div class="result-bar"><div class="result-fill" style="width:${percent}%; background-color:${dynamicColor};">${percent}%</div></div>
                         </div>`;
            });
        }
        adminResults.innerHTML = resultsHtml;

        // 2. Düzenleme Alanı
        if (optKeys.length === 0) {
            editContainer.innerHTML = '<p style="font-size:13px; color:#666; margin:0;">Kayıtlı seçenek yok.</p>';
        } else {
            let editHtml = '<h4 style="margin-top:0; margin-bottom:10px; font-size:14px; color:#2c3e50;">Mevcut Seçenekleri Düzenle</h4>';
            let editArray = optKeys.map((id) => ({ id: id, data: globalData.options[id] }));
            editArray.sort((a, b) => (a.data.number || 0) - (b.data.number || 0));
            
            editArray.forEach(item => {
                editHtml += `<div class="flex-row" style="border-bottom:1px solid #eee; padding-bottom:5px;">
                    <span style="font-weight:bold; color:#2980b9; width:25px;">${item.data.number || '-'})</span>
                    <span style="flex-grow:1; font-size:14px;">${item.data.text}</span>
                    <button class="edit-btn" onclick="editOption('${item.id}')" style="width:auto; margin:0;">Düzenle</button>
                    <button class="delete-btn" onclick="deleteOption('${item.id}')" style="width:auto; margin:0;">Sil</button>
                </div>`;
            });
            editContainer.innerHTML = editHtml;
        }

        const btn = document.getElementById('toggle-results-btn');
        if(globalData.showResults) {
            btn.innerText = "Sonuçları Herkese Göster: AÇIK";
            btn.style.background = "#2ecc71";
        } else {
            btn.innerText = "Sonuçları Herkese Göster: KAPALI";
            btn.style.background = "#9b59b6";
        }

        const codeDisplay = document.getElementById('code-display');
        const codeKeys = Object.keys(globalData.codes);
        
        if(adminCodesVisible) {
            codeDisplay.classList.remove('hidden');
            if(codeKeys.length > 0) {
                let html = `<strong>Kayıtlı Kodlar (${codeKeys.length} Adet):</strong><br>`;
                codeKeys.forEach((code, index) => {
                    const status = globalData.codes[code] ? '<span style="color:red;">(Kullanıldı)</span>' : '(Boş)';
                    html += `${code} ${status} ${index % 3 === 2 ? '<br>' : ' &nbsp;|&nbsp; '}`;
                });
                codeDisplay.innerHTML = html;
            } else {
                codeDisplay.innerHTML = "Henüz kod üretilmedi.";
            }
        } else {
            codeDisplay.classList.add('hidden');
        }
    }

    function verifyCode() {
        const code = document.getElementById('voter-code-input').value.trim();
        const msg = document.getElementById('voter-message');

        if (code.length !== 4) { msg.className = 'error'; msg.innerText = "Lütfen 4 haneli kodunuzu girin."; return; }
        if (globalData.codes[code] === undefined) { msg.className = 'error'; msg.innerText = "Geçersiz veya kayıtlı olmayan kod!"; return; }
        if (globalData.codes[code] === true) { msg.className = 'error'; msg.innerText = "Bu kod ile daha önce oy kullanılmış!"; return; }

        currentValidatedCode = code;
        msg.innerText = "";
        renderVoterPanel(); 
    }

    function checkSelectionLimit(checkbox) {
        const selectedOptions = document.querySelectorAll('input[name="poll_option"]:checked');
        const msg = document.getElementById('voter-message');
        
        if (selectedOptions.length > 3) {
            checkbox.checked = false; 
            msg.className = 'error'; 
            msg.innerText = "En fazla 3 seçenek işaretleyebilirsiniz!";
            
            setTimeout(() => { 
                if(msg.innerText === "En fazla 3 seçenek işaretleyebilirsiniz!") {
                    msg.innerText = ''; 
                }
            }, 3000);
        } else {
            msg.innerText = '';
        }
    }

    function renderVoterPanel() {
        const codeArea = document.getElementById('code-entry-area');
        const votingArea = document.getElementById('voting-area');
        const resultsArea = document.getElementById('public-results-area');
        const title = document.getElementById('page-title');
        const container = document.getElementById('poll-items-container');
        
        const optKeys = Object.keys(globalData.options);
        
        if(globalData.showResults) {
            title.innerText = "Oylama Sonuçları";
            codeArea.classList.add('hidden');
            votingArea.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            
            let totalVotes = 0;
            optKeys.forEach(id => totalVotes += globalData.options[id].votes);
            
            let html = '';
            if(optKeys.length > 0) {
                let optionsArray = optKeys.map((id) => {
                    return { id: id, data: globalData.options[id] };
                });
                optionsArray.sort((a, b) => b.data.votes - a.data.votes);
                
                let maxVotes = optionsArray.length > 0 ? optionsArray[0].data.votes : 0;

                optionsArray.forEach((item) => {
                    const opt = item.data;
                    const percent = totalVotes > 0 ? Math.round((opt.votes / totalVotes) * 100) : 0;
                    const dynamicColor = getBarColor(percent);
                    
                    const isWinner = (opt.votes === maxVotes && maxVotes > 0);
                    const prefixHtml = isWinner ? '<span class="winner-crown">👑</span>' : `<span class="prefix">${opt.number || '-'})</span>`;

                    html += `<div style="margin-bottom:15px;">
                                <strong>${prefixHtml} ${opt.text}</strong> (${opt.votes} Oy)
                                <div class="result-bar"><div class="result-fill" style="width:${percent}%; background-color:${dynamicColor};">${percent}%</div></div>
                             </div>`;
                });
            }
            resultsArea.innerHTML = html || '<p>Kayıtlı veri yok.</p>';
            return;
        } 
        
        resultsArea.classList.add('hidden');
        title.innerText = "Oylama Ekranı";

        if (optKeys.length === 0) {
            codeArea.classList.add('hidden');
            votingArea.classList.remove('hidden');
            container.innerHTML = '<p>Şu an aktif bir oylama bulunmuyor.</p>';
            return;
        }

        if (!currentValidatedCode) {
            codeArea.classList.remove('hidden');
            votingArea.classList.add('hidden');
        } else {
            codeArea.classList.add('hidden');
            votingArea.classList.remove('hidden');
            
            const currentSelections = Array.from(document.querySelectorAll('input[name="poll_option"]:checked')).map(cb => cb.value);

            let html = '';
            
            // Oylama ekranını özel numaraya göre küçükten büyüğe sıralar
            let optionsArray = optKeys.map((id) => {
                return { id: id, data: globalData.options[id] };
            });
            optionsArray.sort((a, b) => (a.data.number || 0) - (b.data.number || 0));

            optionsArray.forEach((item) => {
                const opt = item.data;
                const id = item.id;
                const number = opt.number || '-';
                const isChecked = currentSelections.includes(id) ? 'checked' : '';

                html += `<label class="poll-option">
                            <input type="checkbox" name="poll_option" value="${id}" ${isChecked} onchange="checkSelectionLimit(this)"> 
                            <span class="prefix">${number})</span> ${opt.text}
                         </label>`;
            });
            container.innerHTML = html;
        }
    }

    function submitVote() {
        const msg = document.getElementById('voter-message');
        const selectedOptions = document.querySelectorAll('input[name="poll_option"]:checked');

        if (selectedOptions.length !== 3) { 
            msg.className = 'error'; 
            msg.innerText = `Lütfen tam olarak 3 seçenek işaretleyin. (Şu an ${selectedOptions.length} adet seçtiniz)`; 
            return; 
        }

        selectedOptions.forEach(checkbox => {
            const optionId = checkbox.value;
            globalData.options[optionId].votes += 1;
        });

        globalData.codes[currentValidatedCode] = true; 

        saveToFirebase().then(() => {
            currentValidatedCode = null; 
            document.getElementById('voter-code-input').value = '';
            msg.className = 'success';
            msg.innerText = "Oylarınız başarıyla kaydedildi! Teşekkürler.";
            
            setTimeout(() => {
                msg.innerText = '';
                renderVoterPanel(); 
            }, 3000);
        });
    }

    initLiveSync();
</script>

</body>
</html>
